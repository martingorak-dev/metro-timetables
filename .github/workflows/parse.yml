name: Parse Metro Timetables (A, B, C)

on:
  push:
    paths:
      - "pdf/*.pdf"
      - "parser/**"
      - ".github/workflows/parse.yml"

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Poppler (pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Convert PDFs to text (always)
        run: |
          mkdir -p ocr
          mkdir -p ocr_new
          for f in pdf/*.pdf; do
            base=$(basename "$f")
            prefix=${base:0:1}
            upper=$(echo "$prefix" | tr '[:lower:]' '[:upper:]')

            if [ "$upper" = "A" ] || [ "$upper" = "B" ] || [ "$upper" = "C" ]; then
              echo "Converting $f → ocr_new/$upper.txt"
              pdftotext -layout "$f" "ocr_new/$upper.txt"
            fi
          done

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Compare TXT and run parser only if changed
        run: |
          for line in A B C; do
            if [ -f "ocr_new/$line.txt" ]; then
              if ! cmp -s "ocr_new/$line.txt" "ocr/$line.txt"; then
                echo "TXT for $line changed → updating"
                mv "ocr_new/$line.txt" "ocr/$line.txt"
                dart run parser/parser.dart $line
              else
                echo "TXT for $line unchanged → skipping"
              fi
            fi
          done

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add json/ ocr/
          git commit -m "Update parsed timetables" || echo "No changes to commit"
          git push
