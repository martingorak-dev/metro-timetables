name: Parse Metro Timetables v2

on:
  push:
    paths:
      - "pdf/*.pdf"

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update

      - name: Install Tesseract OCR
        run: sudo apt-get install -y tesseract-ocr

      - name: Install PDF to PNG converter
        run: sudo apt-get install -y poppler-utils

      - name: Convert PDF to PNG
        run: |
          mkdir -p ocr
          for f in pdf/*.pdf; do
            pdftoppm "$f" ocr/page -png
          done

      - name: Run OCR on all PNG pages
        run: |
          rm -f ocr/output.txt
          for img in ocr/page-*.png; do
            tesseract "$img" stdout >> ocr/output.txt
            echo "" >> ocr/output.txt
          done

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Run Dart parser
        run: dart run parser/parser.dart

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add json/ ocr/output.txt
          git commit -m "Update parsed timetables" || echo "No changes to commit"
          git push