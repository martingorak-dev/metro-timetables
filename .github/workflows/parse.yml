name: Parse Metro Timetables (A, B, C)

on:
  push:
    paths:
      - "pdf/*.pdf"

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Detect changed PDF files
        id: changes
        run: |
          echo "modified=${{ join(github.event.head_commit.modified, ' ') }}" >> $GITHUB_OUTPUT
          echo "added=${{ join(github.event.head_commit.added, ' ') }}" >> $GITHUB_OUTPUT

      - name: Install Poppler (pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Convert only changed PDFs to text
        run: |
          mkdir -p ocr
          changed_files="${{ steps.changes.outputs.modified }} ${{ steps.changes.outputs.added }}"

          for f in $changed_files; do
            if [[ "$f" == pdf/* ]]; then
              base=$(basename "$f")
              prefix=${base:0:1}
              upper=$(echo "$prefix" | tr '[:lower:]' '[:upper:]')

              if [ "$upper" = "A" ] || [ "$upper" = "B" ] || [ "$upper" = "C" ]; then
                echo "Converting changed file $f → ocr/$upper.txt"
                pdftotext -layout "$f" "ocr/$upper.txt"
              fi
            fi
          done

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Run parser only for changed lines
        run: |
          changed_files="${{ steps.changes.outputs.modified }} ${{ steps.changes.outputs.added }}"

          for f in $changed_files; do
            if [[ "$f" == pdf/* ]]; then
              base=$(basename "$f")
              prefix=${base:0:1}
              upper=$(echo "$prefix" | tr '[:lower:]' '[:upper:]')

              if [ -f "ocr/$upper.txt" ]; then
                echo "Parsing line $upper"
                dart run parser/parser.dart $upper
              fi
            fi
          done

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add json/ ocr/
          git commit -m "Update parsed timetables" || echo "No changes to commit"
          git push