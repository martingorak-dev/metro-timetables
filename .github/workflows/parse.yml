name: Parse Metro Timetables (A, B, C)

on:
  push:
    paths:
      - "pdf/*.pdf"
      - ".github/workflows/parse.yml"
      - "parser/pdf_to_excel.py"

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies for Camelot
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ghostscript python3-tk libglib2.0-0 libsm6 libxrender1 libxext6
          pip install camelot-py[cv] openpyxl

      - name: Convert PDF to Excel (A, B, C)
        run: |
          mkdir -p excel
          for f in pdf/*.pdf; do
            base=$(basename "$f")
            prefix=${base:0:1}
            upper=$(echo "$prefix" | tr '[:lower:]' '[:upper:]')

            if [ "$upper" = "A" ] || [ "$upper" = "B" ] || [ "$upper" = "C" ]; then
              echo "Converting $f → excel/$upper.xlsx"
              python3 parser/pdf_to_excel.py "$f" "excel/$upper.xlsx"
            fi
          done

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add excel/
          git commit -m "Update Excel timetables" || echo "No changes to commit"
          git push
