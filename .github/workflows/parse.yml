name: Parse Metro Timetables (new)

on:
  push:
    paths:
      - "pdf/*.pdf"

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Poppler (pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Convert PDF to text (layout preserved)
        run: |
          echo "PDF files in repo:"
          ls -l pdf
          mkdir -p ocr
          rm -f ocr/output.txt
          for f in pdf/*.pdf; do
            echo "Processing $f"
            pdftotext -layout "$f" "ocr/output.txt"
          done

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Run Dart parser
        run: dart run parser/parser.dart

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add json/ ocr/output.txt
          git commit -m "Update parsed timetables" || echo "No changes to commit"
          git push